name: Schema Description Review - Compile

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.json"
      - "CHANGELOG.md"

permissions:
  contents: read

jobs:
  compile:
    name: Compile schema and prepare review context
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install compiler
        run: pip install ocsf-schema-compiler

      - name: Compile schema
        run: ocsf-schema-compiler . > compiled_schema.json

      - name: Collect PR metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "$PR_NUMBER" > pr_number.txt
          # Use -U15 so deeply-nested edits (e.g. enum-only changes) include
          # enough surrounding context for the review context extractor to
          # identify the enclosing attribute.
          git diff -U15 "$BASE_SHA...$HEAD_SHA" > pr_diff.txt
          git diff --name-only "$BASE_SHA...$HEAD_SHA" > changed_files.txt

      - name: Extract review context
        run: python .github/scripts/review_descriptions.py prepare

      - name: Upload review context
        uses: actions/upload-artifact@v4
        with:
          name: review-context
          path: review_context.json
          retention-days: 1
