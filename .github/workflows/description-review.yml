name: Schema Description Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.json"
      - "CHANGELOG.md"

permissions:
  contents: read
  pull-requests: write

jobs:
  review-descriptions:
    name: Review schema descriptions for LLM comprehension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install ocsf-schema-compiler anthropic

      - name: Review descriptions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ZACHS_CLAUDE_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/review_descriptions.py
